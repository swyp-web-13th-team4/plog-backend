server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: plog-dev-log
    static_configs:
      - targets:
          - plog-dev
        labels:
          job: plog-app
          host: plog-dev
          env: dev
          __path__: /var/log/plog/*.log
    pipeline_stages:
      - regex:
          expression: '^(?P<log_time>(?P<date>\d{4}-\d{2}-\d{2}) (?P<time>\d{2}:\d{2}:\d{2}\.\d{3})) \[(?P<thread>[^\]]+)\] \[(?P<level>[A-Z]+)\s*\] (?P<logger>[^ ]+) - (?P<msg>.*)$'
      - timestamp:
          source: date
          format: '2006-01-02 15:04:05.000'
          location: 'Asia/Seoul'
      - labels:
          thread:
          level:
          logger:
      - output:
          source: msg