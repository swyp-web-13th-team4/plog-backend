name: Plog Dev Deploy

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    environment: dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Docker Build
        run: |
          docker build \
            -t ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY }}:latest \
            -t ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY }}:${GITHUB_SHA::8} .

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Hub Push
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY }}:latest
          docker push ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY }}:${GITHUB_SHA::8}

      - name: Copy promtail-config to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "infra/promtail/promtail-config.dev.yml"
          target: ${{ secrets.DEPLOY_DIR }}/infra/promtail
          strip_components: 2

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.dev.yml"
          target: ${{ secrets.DEPLOY_DIR }}

      - name: Create .env file
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            cat > .env.dev << EOF
            MYSQL_ROOT_PASSWORD=$(gcloud secrets versions access latest --secret=dev-MYSQL_ROOT_PASSWORD)
            MYSQL_DATABASE=$(gcloud secrets versions access latest --secret=dev-MYSQL_DATABASE)
            MYSQL_USER=$(gcloud secrets versions access latest --secret=dev-MYSQL_USER)
            MYSQL_PASSWORD=$(gcloud secrets versions access latest --secret=dev-MYSQL_PASSWORD)
            DOCKERHUB_USERNAME=$(gcloud secrets versions access latest --secret=dev-DOCKERHUB_USERNAME)
            DOCKERHUB_REPOSITORY=$(gcloud secrets versions access latest --secret=dev-DOCKERHUB_REPOSITORY)
            DEV_DB_URL=$(gcloud secrets versions access latest --secret=dev-DB_URL)
            DEV_DB_USERNAME=$(gcloud secrets versions access latest --secret=dev-DB_USERNAME)
            DEV_DB_PASSWORD=$(gcloud secrets versions access latest --secret=dev-DB_PASSWORD)
            JWT_SECRET_KEY=$(gcloud secrets versions access latest --secret=dev-JWT_SECRET_KEY)
            EOF

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            docker compose -f docker-compose.dev.yml --env-file .env.dev pull
            docker compose -f docker-compose.dev.yml --env-file .env.dev up -d