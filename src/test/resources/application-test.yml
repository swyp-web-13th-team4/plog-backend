spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    com.plog: debug

jwt:
  secret-key: test-secret-key

kakao:
  client-id: test
  client-secret: test
  redirect-uri: http://localhost:8080/test

spring.cloud.gcp.storage:
  bucket: test-bucket
  project-id: test-project