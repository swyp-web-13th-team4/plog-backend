spring:
  config:
    activate:
      on-profile: local


  security:
    front:
      cors:
        allowed-origins: "http://localhost:3000" # 프론트 CORS 허용 주소
      frontend-url: http://localhost:8080

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        hbm2ddl:
          auto: create

logging:
  level:
    com.plog: debug