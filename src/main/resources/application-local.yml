spring:
  config:
    activate:
      on-profile: local


  security:
    front:
      cors:
        allowed-origins: "http://localhost:8080" # 프론트 CORS 허용 주소
      frontend-url: http://localhost:8080 # 프론트 페이지 주소

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        hbm2ddl:
          auto: create

# 로컬 환경(HTTP)에서는 Secure 쿠키 비활성화
cookie:
  secure: false
  sameSite: Lax

logging:
  level:
    com.plog: debug