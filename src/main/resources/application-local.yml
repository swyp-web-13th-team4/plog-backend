spring:
  config:
    activate:
      on-profile: local
    import: sm://

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    hikari:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: ${DB_URL}
      username: ${DB_USERNAME}
      password: ${DB_PASSWORD}

  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        hbm2ddl:
          auto: create

logging:
  level:
    com.plog: debug